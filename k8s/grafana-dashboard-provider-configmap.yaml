apiVersion: v1
data:
  dashboard.yml: |
    apiVersion: 1

    providers:
      - name: "pdm"
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: pdm
