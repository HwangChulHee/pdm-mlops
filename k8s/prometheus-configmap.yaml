apiVersion: v1
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: "pdm-api"
        metrics_path: /metrics
        static_configs:
          - targets: ["api:8000"]
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: pdm
